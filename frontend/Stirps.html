<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stirps · Árvore genealógica</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;550;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,450;9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="stylesheets/styles.css"/>
</head>
<body>

<div id="app-root"></div>

<!-- Runtime config (apiBaseUrl, supabaseUrl, supabaseAnonKey) precisa carregar
     antes de qualquer outro script para que React/components possam ler de
     window.STIRPS_CONFIG sincronamente. Ver frontend/README.md. -->
<script src="scripts/config.js"></script>
<script>
  if (!window.STIRPS_CONFIG) {
    console.error("[stirps] STIRPS_CONFIG missing — scripts/config.js did not load");
  }
</script>

<!-- Supabase JS SDK (UMD) — expõe window.supabase com createClient. Pin de
     versão minor + SRI para evitar drift. Recomputar o hash se atualizar:
     curl -fsSL "<url>" | openssl dgst -sha384 -binary | openssl base64 -A -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.js" integrity="sha384-dGnL7r9uccC9TdSdE05clTJ6esxMU42XBQ1/BWLzKQOBi7qR1aCMRIi0LzUmexIg" crossorigin="anonymous"></script>
<script>
  if (!window.supabase) {
    console.error("[stirps] Supabase SDK failed to load");
  }
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- auth.js usa React hooks; precisa de React carregado antes. api.js usa
     window.supabaseClient (definido por auth.js) para puxar o access_token. -->
<script src="scripts/auth.js"></script>
<script src="scripts/api.js"></script>
<script src="scripts/adapters.js"></script>
<script src="scripts/genealogy-api.js"></script>
<script src="scripts/tree-layout.js"></script>
<script src="scripts/tree-data.js"></script>
<script src="scripts/data.js"></script>
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/tweaks-panel.jsx"></script>
<script type="text/babel" src="components/components.jsx"></script>
<script type="text/babel" src="components/dashboard.jsx"></script>
<script type="text/babel" src="components/tree.jsx"></script>
<script type="text/babel" src="components/profile.jsx"></script>
<script type="text/babel" src="components/modals.jsx"></script>
<script type="text/babel" src="components/other-pages.jsx"></script>
<script type="text/babel" src="components/mobile.jsx"></script>
<script type="text/babel" src="components/auth-screen.jsx"></script>
<script type="text/babel" src="components/settings.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>

</body>
</html>
