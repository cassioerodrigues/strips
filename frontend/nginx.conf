server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index Stirps.html;

    location / {
        try_files $uri $uri/ /Stirps.html;
    }

    # Runtime config nunca pode ser cacheada: ela é reescrita pelo
    # docker-entrypoint a cada boot a partir das envs do EasyPanel.
    # Este bloco prefix-exact é avaliado antes do regex abaixo.
    location = /scripts/config.js {
        add_header Cache-Control "no-store" always;
    }

    # Cache leve dos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
